# Provenance lock for the vendored PRODUCTION static assets that ship inside the
# generated site's content-addressed bundle (§4.4, §12.6, §133, §292). Every
# entry records upstream URL/tag, license path, and the exact SHA-256 of the file
# as committed under main/website/static/. Builds are OFFLINE: the generator copies
# these bytes verbatim into the bundle and never downloads them; this file is the
# human-auditable record of what those bytes are and where they came from.
#
# The separate main/website/third_party.lock.yaml locks the Python/Playwright
# VALIDATION toolchain (schema bioseq.website.python_toolchain.lock/v1); this file
# locks the assets served to end users.
schema: bioseq.website.static_assets.lock/v1

